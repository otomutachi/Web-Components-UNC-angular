<main>

  <h1>Mini réseau social </h1>

  <h2>Total likes : {{ totalLikes }}</h2>
  
  <app-search-bar
	   (searchChanged)="onSearch($event)">
  </app-search-bar>

  <app-user-card
    *ngFor="let user of filteredUsers"
    [name]="user.name"
    [bio]="user.bio"
    [avatar]="user.avatar"
    [showActions]="true"
    (liked)="onLiked($event)"
    (followToggled)="onFollowToggled($event)">
  </app-user-card>


  <app-stats-panel
    [userCount]="filteredUsers.length"
    [totalLikes]="totalLikes"
    [totalFollows]="totalFollows"
    [users]="filteredUsers">
  </app-stats-panel>

</main>
